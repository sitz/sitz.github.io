<style type="text/css">
    #container {
        position: relative;
        width: 100%;
        height: 90vh;
    }
</style>

<body>
<div id="container"></div>
<h3 align="center"></h3>
<script>
    var map = new Datamap({
        element: document.getElementById('container'),
        scope: 'world',
        projection: 'mercator',
        responsive: false,
        dataType: 'json',
        dataUrl: 'data/countries.json',
        geographyConfig: {
            hideAntarctica: true,
            borderColor: '#ffffff',
            borderWidth: 0.8,
            borderOpacity: 1,
            highlightOnHover: true,
            popupOnHover: true,
            highlightFillColor: function(data) {
                return data && data.fillKey === 'travelled' ? '#3d8a50' : '#9cc8df';
            },
            highlightFillOpacity: 1,
            highlightBorderColor: '#ffffff',
            highlightBorderWidth: 1,
            highlightBorderOpacity: 1
        },
        fills: {
            defaultFill: '#c7e4f3',
            travelled: '#2f6b3f'
        },
        done: function(datamap) {
            function updateStats() {
                document.body.querySelector('h3').innerText = `World Travel Stats (${Object.keys(datamap.options.data).length} / ${window.Datamap.prototype.worldTopo.objects.world.geometries.length})`;
            }
            window.setTimeout(updateStats, 100);
        }
    });
</script>

</body>
