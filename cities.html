<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8TWKVGFZP3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-8TWKVGFZP3');
    </script>

    <meta charset="UTF-8">

    <meta name="description" content="Map of cities travelled by Sitesh Shrivastava">
    <meta name="keywords" content="Map, Cities, Travel">
    <meta name="author" content="Sitesh Shrivastava">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@siteshps">
    <meta name="twitter:title" content="Cities traveled by Sitesh">
    <meta name="twitter:description" content="Map of cities travelled by Sitesh Shrivastava">
    <meta name="twitter:image" content="https://code.siteshshrivastava.com/assets/preview_cities.png">

    <link rel="canonical" href="https://code.siteshshrivastava.com/cities">
    <link rel="shortcut icon" href="assets/favicon.ico">

    <title>Cities traveled by Sitesh</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.11.0/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@5.11.0/dist/maplibre-gl.js"></script>

    <style>
        :root {
            --text: #2f241d;
            --muted: #6d6055;
            --summary-bg: rgba(248, 242, 234, 0.92);
            --summary-border: rgba(83, 65, 48, 0.16);
            --shadow: 0 18px 38px rgba(56, 45, 35, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.68), transparent 34%),
                linear-gradient(180deg, #faf5ee 0%, #f1e7db 100%);
            color: var(--text);
            font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
        }

        #map {
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.45), transparent 26%),
                linear-gradient(180deg, #f8f0e5 0%, #ead9c5 100%);
        }

        .maplibregl-ctrl-group {
            border: 1px solid var(--summary-border);
            box-shadow: var(--shadow);
            background: rgba(248, 242, 234, 0.94);
        }

        .maplibregl-ctrl-group button {
            background: transparent;
        }

        .maplibregl-popup-content {
            border-radius: 16px;
            padding: 12px 14px;
            background: rgba(248, 242, 234, 0.96);
            color: var(--text);
            box-shadow: var(--shadow);
            font-size: 13px;
            line-height: 1.45;
        }

        .maplibregl-popup-tip {
            border-top-color: rgba(248, 242, 234, 0.96);
        }

        .maplibregl-ctrl-attrib {
            background: rgba(248, 242, 234, 0.85);
            color: var(--muted);
        }

        .summary-line {
            position: absolute;
            left: 50%;
            bottom: 16px;
            z-index: 20;
            transform: translateX(-50%);
            width: max-content;
            max-width: calc(100% - 24px);
            padding: 12px 18px;
            border: 1px solid var(--summary-border);
            border-radius: 999px;
            background: var(--summary-bg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
            font-size: 15px;
            line-height: 1.45;
            color: var(--text);
            pointer-events: none;
            white-space: nowrap;
        }

        .summary-line span {
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .summary-line {
                bottom: 12px;
                width: auto;
                max-width: calc(100% - 20px);
                padding: 11px 14px;
                border-radius: 22px;
                font-size: 13px;
                white-space: normal;
            }
        }
    </style>
</head>
<body>
<div id="map" aria-label="Map of visited cities"></div>
<div class="summary-line" id="summaryLine">Loading cities…</div>
<div id="hoverLabel" style="display:none; position:absolute; z-index:25; pointer-events:none; padding:6px 10px; border:1px solid rgba(83, 65, 48, 0.16); border-radius:999px; background:rgba(248, 242, 234, 0.96); color:#2f241d; box-shadow:0 12px 24px rgba(56, 45, 35, 0.14); font-size:12px; line-height:1.2; white-space:nowrap;"></div>

<script>
    const summaryLine = document.getElementById('summaryLine');
    const hoverLabel = document.getElementById('hoverLabel');
    const numberFormatter = new Intl.NumberFormat('en-US');

    const baseStyle = {
        version: 8,
        sources: {
            carto: {
                type: 'raster',
                tiles: [
                    'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                    'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                    'https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                    'https://d.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'
                ],
                tileSize: 256,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
            }
        },
        layers: [
            {
                id: 'carto-base',
                type: 'raster',
                source: 'carto'
            }
        ]
    };

    const map = new maplibregl.Map({
        container: 'map',
        style: baseStyle,
        center: [10, 25],
        zoom: 1.6,
        maxZoom: 18,
        attributionControl: false,
        renderWorldCopies: true
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.AttributionControl({ compact: true }));

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function buildSummary(cities) {
        const countries = new Map();
        cities.forEach(city => {
            countries.set(city.country, (countries.get(city.country) || 0) + 1);
        });
        return `${numberFormatter.format(cities.length)} cities <span>across</span> ${numberFormatter.format(countries.size)} countries`;
    }

    function buildGeoJson(cities) {
        return {
            type: 'FeatureCollection',
            features: cities.map(city => ({
                type: 'Feature',
                geometry: {
                    type: 'Point',
                    coordinates: [city.longitude, city.latitude]
                },
                properties: {
                    name: city.name,
                    country: city.country
                }
            }))
        };
    }

    function fitToCities(cities) {
        const bounds = cities.reduce((bbox, city) => {
            bbox.extend([city.longitude, city.latitude]);
            return bbox;
        }, new maplibregl.LngLatBounds([cities[0].longitude, cities[0].latitude], [cities[0].longitude, cities[0].latitude]));

        map.fitBounds(bounds, {
            padding: {
                top: 20,
                right: 20,
                bottom: 80,
                left: 20
            },
            duration: 0
        });
    }

    fetch('data/cities.json')
        .then(response => {
            if (!response.ok) {
                throw new Error(`Request failed with status ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            if (!Array.isArray(data) || !data.length) {
                throw new Error('No city data found.');
            }

            const cities = data.filter(city =>
                city &&
                typeof city.name === 'string' &&
                typeof city.country === 'string' &&
                Number.isFinite(city.latitude) &&
                Number.isFinite(city.longitude)
            );

            if (!cities.length) {
                throw new Error('No usable city coordinates found.');
            }

            const geoJson = buildGeoJson(cities);

            const initializeLayers = () => {
                map.addSource('cities', {
                    type: 'geojson',
                    data: geoJson
                });

                map.addLayer({
                    id: 'city-glow',
                    type: 'circle',
                    source: 'cities',
                    paint: {
                        'circle-radius': [
                            'interpolate',
                            ['linear'],
                            ['zoom'],
                            1.5, 6,
                            4, 8,
                            8, 10
                        ],
                        'circle-color': '#bf6137',
                        'circle-opacity': 0.18,
                        'circle-blur': 0.8
                    }
                });

                map.addLayer({
                    id: 'city-points',
                    type: 'circle',
                    source: 'cities',
                    paint: {
                        'circle-radius': [
                            'interpolate',
                            ['linear'],
                            ['zoom'],
                            1.5, 2.8,
                            4, 3.8,
                            8, 5.5
                        ],
                        'circle-color': '#8f341e',
                        'circle-stroke-color': 'rgba(255, 248, 242, 0.96)',
                        'circle-stroke-width': 1.2,
                        'circle-opacity': 0.96
                    }
                });

                map.on('click', 'city-points', event => {
                    const feature = event.features && event.features[0];
                    if (!feature) return;

                    new maplibregl.Popup({ offset: 10 })
                        .setLngLat(feature.geometry.coordinates)
                        .setHTML(
                            `<strong>${escapeHtml(feature.properties.name)}</strong><br>${escapeHtml(feature.properties.country)}`
                        )
                        .addTo(map);
                });

                map.on('mouseenter', 'city-points', () => {
                    map.getCanvas().style.cursor = 'pointer';
                });

                map.on('mousemove', 'city-points', event => {
                    const feature = event.features && event.features[0];
                    if (!feature) return;

                    hoverLabel.style.display = 'block';
                    hoverLabel.style.left = `${event.point.x + 12}px`;
                    hoverLabel.style.top = `${event.point.y - 10}px`;
                    hoverLabel.textContent = feature.properties.name;
                });

                map.on('mouseleave', 'city-points', () => {
                    map.getCanvas().style.cursor = '';
                    hoverLabel.style.display = 'none';
                });

                fitToCities(cities);
                summaryLine.innerHTML = buildSummary(cities);
            };

            if (map.isStyleLoaded()) {
                initializeLayers();
            } else {
                map.once('load', initializeLayers);
            }
        })
        .catch(error => {
            console.error(error);
            summaryLine.textContent = 'City data could not be loaded.';
        });
</script>
</body>
</html>
